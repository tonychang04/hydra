# fly.toml — Hydra commander Phase 2 deployment config.
#
# Ship this as-is (the operator customizes `app` + `primary_region` per their
# Fly.io account). `scripts/deploy-vps.sh` drives first-time setup; after that
# the usual `fly deploy` picks up framework changes.
#
# Shape:
#   - shared-cpu-1x / 512MB  — plenty for a single commander process. Claude
#     Code holds a websocket; workers spawn short-lived subprocesses. Scale up
#     by editing [[vm]] if you run many concurrent workers.
#   - /hydra/data persistent volume — state/memory/logs survive redeploys.
#   - auto_stop "suspend" + min_machines_running = 0 — costs collapse to ~$0
#     when idle; webhook traffic (follow-up #40/#41) wakes the machine back up.
#     Until webhooks land, the operator may prefer `auto_stop_machines = "off"`
#     and `min_machines_running = 1` so autopickup keeps ticking. Flip as needed.
#   - [[http_service]] on 8080 → /health endpoint served by entrypoint.sh.
#   - [[services]] on 8765 → /mcp endpoint served by scripts/hydra-mcp-server.py
#     (spec: docs/specs/2026-04-17-mcp-server-binary.md, ticket #72). Uses the
#     [[services]] block (not a second [[http_service]]) because Fly permits
#     multiple [[services]] stanzas on distinct ports; exactly one
#     [[http_service]] is supported per config. The MCP port is NOT force_https
#     at the Fly level — clients call it internally from other authorized
#     agents; public exposure still requires an operator-configured reverse
#     proxy. See docs/phase2-vps-runbook.md §"Wiring up an external agent".
#
# NOT in this file (separate tickets):
#   - webhook routes (#40/#41) — will add routes on the existing /mcp service
#     (or a dedicated webhook service) once that handler lands.
#   - Slack bot (#42) — same story; no socket-mode app config here yet.

app = "hydra-commander"              # Operator: rename to your Fly app before first deploy.
# primary_region = "iad"             # Operator: uncomment + set to your nearest Fly region
                                     # (e.g. "iad", "sjc", "fra", "nrt"). Run `fly platform regions`
                                     # to see options. Left commented so `fly launch --copy-config`
                                     # prompts interactively on first run.

kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "Dockerfile"

[env]
  HYDRA_DATA_DIR      = "/hydra/data"
  HYDRA_HEALTH_PORT   = "8080"
  HYDRA_TMUX_SESSION  = "commander"
  HYDRA_MCP_PORT      = "8765"
  HYDRA_MCP_BIND      = "0.0.0.0"       # Bind inside the VM only; Fly's [[services]]
                                        # below exposes the port externally. Do NOT
                                        # change HYDRA_MCP_BIND for local dev —
                                        # hydra-mcp-server.py defaults to loopback.
  HYDRA_MCP_ENABLED   = "1"             # Operator rollback: `fly secrets set HYDRA_MCP_ENABLED=0`
                                        # to skip the MCP server background launch.
  # CLAUDE_CODE_OAUTH_TOKEN, ANTHROPIC_API_KEY, GITHUB_TOKEN go in `fly secrets`,
  # never here. See docs/phase2-vps-runbook.md.

# Persistent volume — state/memory/logs live here so `fly deploy` doesn't wipe
# the operator's in-flight workers, memory citations, or retros.
[[mounts]]
  source      = "hydra_data"
  destination = "/hydra/data"
  # initial_size = "1gb"   # Created by scripts/deploy-vps.sh via `fly volumes create`.

# /health on 8080. Phase 1: only /health. Phase 2 follow-ups add /webhook/* paths.
[http_service]
  internal_port        = 8080
  force_https          = true
  auto_stop_machines   = "suspend"    # Idle cost savings. Suspend preserves RAM/FS.
  auto_start_machines  = true
  min_machines_running = 0            # Operator: set to 1 if you want autopickup to tick
                                      # continuously without waiting for an inbound request.
  processes            = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval     = "15s"
    method       = "GET"
    timeout      = "5s"
    path         = "/health"

# /mcp on 8765 — Hydra's agent-only interface (JSON-RPC 2.0 over HTTP). Bearer-
# token auth enforced by the server itself (no Fly-level auth). See
# docs/specs/2026-04-17-mcp-server-binary.md for the full threat model.
# This is a [[services]] block (not [[http_service]]) because Fly only allows
# one [[http_service]] per config; [[services]] is the lower-level primitive
# that permits multiple external ports. The MCP server speaks HTTP, not raw TCP,
# but we keep the block minimal: no health check here (the MCP server doesn't
# expose a GET health endpoint — clients POST JSON-RPC to /mcp and auth first).
[[services]]
  internal_port = 8765
  protocol      = "tcp"
  processes     = ["app"]
  auto_stop_machines  = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [[services.ports]]
    port     = 443
    handlers = ["tls", "http"]
    # NOTE: plaintext port 8765 was removed per security review — bearer tokens
    # must not travel over cleartext on the public internet. Fly's edge handles
    # TLS termination, so internal_port=8765 is reached by clients via
    # https://<app>.fly.dev/mcp (port 443 → TLS-terminated → internal 8765).

  [[services.tcp_checks]]
    grace_period  = "30s"
    interval      = "15s"
    timeout       = "5s"

# Opt-in docker-in-docker support (ticket #77 / spec:
# docs/specs/2026-04-17-cloud-worker-docker.md). Left OFF here by design:
# flipping privileged mode is an attestation the operator has read the
# runbook, accepted the security surface, and intends to build the DinD
# image variant. Do NOT add `privileged = true` to this file as a default.
#
# If you need DinD:
#   1. Rebuild with `fly deploy --build-arg ENABLE_DOCKER=true`.
#   2. Enable privileged mode on the Machine (the current flyctl syntax
#      is pinned in docs/phase2-vps-runbook.md §"Enabling worker docker
#      support" — we keep the runbook as the single source of truth
#      because Fly's API has moved before).
#   3. Verify with `fly ssh console -C 'docker info'` — expect a live
#      daemon report, not `Cannot connect to the Docker daemon`.
#   4. Size `hydra_data` to 3-5 GB instead of 1 GB — layered images
#      accumulate under /var/lib/docker inside the persistent volume.
#
# Rollback: rebuild with ENABLE_DOCKER=false (or omit the build-arg)
# and `fly machine update --vm-privileged=false`. Nothing on the
# volume is touched by the flip.
#
# This is Phase 2. Long-term migration path: per-worker managed
# sandboxes (E2B / Daytona / Managed Agents) tracked under #40.

[[vm]]
  size        = "shared-cpu-1x"
  memory      = "512mb"
  cpu_kind    = "shared"
  cpus        = 1

[deploy]
  strategy = "immediate"              # Single-machine deploy; nothing to roll through.
